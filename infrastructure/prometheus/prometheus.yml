# Prometheus configuration for Move Big Rocks
# Deployed to: /etc/prometheus/prometheus.yml
#
# Uses file-based service discovery so deploy scripts can update
# the active port after each blue-green slot switch.
# Target files: /etc/prometheus/targets/{app}.json
# Updated by: /usr/local/bin/update-prometheus-target

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mbr
    file_sd_configs:
      - files: ["/etc/prometheus/targets/mbr.json"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
