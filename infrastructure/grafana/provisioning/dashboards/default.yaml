# Grafana dashboard provisioning configuration
# Deployed to: /etc/grafana/provisioning/dashboards/default.yaml

apiVersion: 1
providers:
  - name: "Move Big Rocks Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
