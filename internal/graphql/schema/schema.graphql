# Move Big Rocks GraphQL API Schema
# Used by admin portal, services, and AI agents

scalar DateTime
scalar JSON

# =============================================================================
# Principal Types (Users and Agents)
# =============================================================================

enum PrincipalType {
  user
  agent
}

enum AgentStatus {
  active
  suspended
  revoked
}

type Agent {
  id: ID!
  workspaceID: ID!
  name: String!
  description: String
  ownerID: ID!
  owner: User
  status: AgentStatus!
  statusReason: String
  createdAt: DateTime!
  updatedAt: DateTime!
  createdByID: ID!
  tokens: [AgentToken!]!
  membership: WorkspaceMembership
}

type AgentToken {
  id: ID!
  agentID: ID!
  tokenPrefix: String!
  name: String!
  expiresAt: DateTime
  revokedAt: DateTime
  lastUsedAt: DateTime
  lastUsedIP: String
  useCount: Int!
  createdAt: DateTime!
  createdByID: ID!
}

type User {
  id: ID!
  email: String!
  name: String!
  avatarURL: String
}

type WorkspaceMembership {
  id: ID!
  workspaceID: ID!
  principalID: ID!
  principalType: PrincipalType!
  role: String!
  permissions: [String!]!
  constraints: MembershipConstraints!
  grantedAt: DateTime!
  expiresAt: DateTime
  revokedAt: DateTime
}

type MembershipConstraints {
  rateLimitPerMinute: Int
  rateLimitPerHour: Int
  allowedIPs: [String!]!
  allowedProjectIDs: [ID!]!
  allowedTeamIDs: [ID!]!
  allowDelegatedRouting: Boolean!
  delegatedRoutingTeamIDs: [ID!]!
  activeHoursStart: String
  activeHoursEnd: String
  activeTimezone: String
  activeDays: [Int!]!
}

type Team {
  id: ID!
  workspaceID: ID!
  name: String!
  description: String
  emailAddress: String
  responseTimeHours: Int!
  resolutionTimeHours: Int!
  autoAssign: Boolean!
  autoAssignKeywords: [String!]!
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  members: [TeamMember!]!
}

type TeamMember {
  id: ID!
  teamID: ID!
  userID: ID!
  workspaceID: ID!
  role: String!
  isActive: Boolean!
  joinedAt: DateTime!
  createdAt: DateTime!
  updatedAt: DateTime!
}

# =============================================================================
# Workspace
# =============================================================================

type Workspace {
  id: ID!
  name: String!
  shortCode: String!
  agents: [Agent!]!
  teams: [Team!]!
  queues: [Queue!]!
  extensions: [InstalledExtension!]!
  cases(filter: CaseFilter): CaseConnection!
}

# =============================================================================
# Support (Cases)
# =============================================================================

# Case status matches shareddomain constants
enum CaseStatus {
  new
  open
  pending
  resolved
  closed
  spam
}

enum CasePriority {
  low
  medium
  high
  urgent
}

type Queue {
  id: ID!
