# =============================================================================
# Filters
# =============================================================================

input CaseFilter {
  status: [CaseStatus!]
  priority: [CasePriority!]
  queueID: ID
  assigneeID: ID
  contactID: ID
  search: String
  first: Int
  after: String
}

# =============================================================================
# Queries
# =============================================================================

type Query {
  # Current principal info
  me: Principal!

  # Workspace queries
  workspace(id: ID!): Workspace
  workspaces: [Workspace!]!
  team(id: ID!): Team
  teams(workspaceID: ID!): [Team!]!

  # Case queries
  case(id: ID!): Case
  caseByHumanID(workspaceID: ID!, caseID: String!): Case
  cases(workspaceID: ID!, filter: CaseFilter): CaseConnection!
  queue(id: ID!): Queue
  queues(workspaceID: ID!): [Queue!]!
  conversationSession(id: ID!): ConversationSession
  conversationSessions(workspaceID: ID!, filter: ConversationSessionFilter): [ConversationSession!]!
  knowledgeResource(id: ID!): KnowledgeResource
  knowledgeResourceBySlug(workspaceID: ID!, teamID: ID!, surface: KnowledgeSurface!, slug: String!): KnowledgeResource
  knowledgeResources(workspaceID: ID!, filter: KnowledgeResourceFilter): [KnowledgeResource!]!
  knowledgeResourceHistory(id: ID!, limit: Int): [KnowledgeRevision!]!
  knowledgeResourceDiff(id: ID!, fromRevision: String, toRevision: String): KnowledgeDiff!
  conceptSpec(workspaceID: ID, key: String!, version: String): ConceptSpec
  conceptSpecs(workspaceID: ID): [ConceptSpec!]!
  conceptSpecHistory(workspaceID: ID, key: String!, version: String, limit: Int): [ConceptSpecRevision!]!
  conceptSpecDiff(workspaceID: ID, key: String!, version: String, fromRevision: String, toRevision: String): ConceptSpecDiff!
  serviceCatalogNode(id: ID!): ServiceCatalogNode
  serviceCatalogNodeByPath(workspaceID: ID!, path: String!): ServiceCatalogNode
  serviceCatalogNodes(workspaceID: ID!, parentNodeID: ID): [ServiceCatalogNode!]!
  formSpec(id: ID!): FormSpec
  formSpecBySlug(workspaceID: ID!, slug: String!): FormSpec
  formSpecs(workspaceID: ID!): [FormSpec!]!
  formSubmission(id: ID!): FormSubmission
  formSubmissions(workspaceID: ID!, filter: FormSubmissionFilter): [FormSubmission!]!
  extension(id: ID!): InstalledExtension
  extensions(workspaceID: ID!): [InstalledExtension!]!
  instanceExtensions: [InstalledExtension!]!
  workspaceExtensionAdminNavigation(workspaceID: ID!): [ResolvedExtensionAdminNavigationItem!]!
  workspaceExtensionDashboardWidgets(workspaceID: ID!): [ResolvedExtensionDashboardWidget!]!
  instanceExtensionAdminNavigation: [ResolvedExtensionAdminNavigationItem!]!
  instanceExtensionDashboardWidgets: [ResolvedExtensionDashboardWidget!]!
  extensionEventCatalog(workspaceID: ID!): [ExtensionRuntimeEvent!]!
  extensionArtifactFiles(id: ID!, surface: String!): [ExtensionArtifactFile!]!
  extensionArtifactContent(id: ID!, surface: String!, path: String!, ref: String): String!
  extensionArtifactHistory(id: ID!, surface: String!, path: String!, limit: Int): [ArtifactRevision!]!
  extensionArtifactDiff(id: ID!, surface: String!, path: String!, fromRevision: String, toRevision: String): ArtifactDiff!

  # Agent queries (for management)
  agent(id: ID!): Agent
  agents(workspaceID: ID!): [Agent!]!
  contacts(workspaceID: ID!): [Contact!]!
}

# Principal union for polymorphic auth context
union Principal = User | Agent

# =============================================================================
# Mutations
# =============================================================================

type Mutation {
  # Case mutations
  createCase(input: CreateCaseInput!): Case!
  addCommunication(input: AddCommunicationInput!): Communication!
  addCaseNote(id: ID!, body: String!): Communication!
  replyToCase(id: ID!, input: ReplyToCaseInput!): Communication!
  updateCaseStatus(id: ID!, status: CaseStatus!): Case!
  setCasePriority(id: ID!, priority: CasePriority!): Case!
  assignCase(id: ID!, assigneeID: ID): Case!
  handoffCase(id: ID!, input: CaseHandoffInput!): Case!
  createQueue(input: CreateQueueInput!): Queue!
  updateQueue(id: ID!, input: UpdateQueueInput!): Queue!
  createFormSpec(input: CreateFormSpecInput!): FormSpec!
  updateFormSpec(id: ID!, input: UpdateFormSpecInput!): FormSpec!
  createFormSubmission(input: CreateFormSubmissionInput!): FormSubmission!
  setCaseQueue(caseID: ID!, queueID: ID): Case!
  addConversationMessage(sessionID: ID!, input: AddConversationMessageInput!): ConversationMessage!
  handoffConversation(sessionID: ID!, input: ConversationHandoffInput!): ConversationSession!
  escalateConversation(sessionID: ID!, input: EscalateConversationInput!): Case!
  createKnowledgeResource(input: CreateKnowledgeResourceInput!): KnowledgeResource!
  updateKnowledgeResource(id: ID!, input: UpdateKnowledgeResourceInput!): KnowledgeResource!
  reviewKnowledgeResource(id: ID!, status: KnowledgeReviewStatus): KnowledgeResource!
  publishKnowledgeResource(id: ID!, surface: KnowledgeSurface): KnowledgeResource!
  shareKnowledgeResource(id: ID!, input: ShareKnowledgeResourceInput!): KnowledgeResource!
  deleteKnowledgeResource(id: ID!): KnowledgeResource!
  registerConceptSpec(input: RegisterConceptSpecInput!): ConceptSpec!
  installExtension(input: InstallExtensionInput!): InstalledExtension!
  upgradeExtension(id: ID!, input: UpgradeExtensionInput!): InstalledExtension!
  activateExtension(id: ID!): InstalledExtension!
  deactivateExtension(id: ID!, reason: String): InstalledExtension!
  uninstallExtension(id: ID!): Boolean!
  validateExtension(id: ID!): InstalledExtension!
  checkExtensionHealth(id: ID!): InstalledExtension!
  updateExtensionConfig(id: ID!, input: UpdateExtensionConfigInput!): InstalledExtension!
  updateExtensionAsset(id: ID!, input: UpdateExtensionAssetInput!): ExtensionAsset!
  publishExtensionArtifact(id: ID!, input: PublishExtensionArtifactInput!): ExtensionArtifactPublication!

  # Agent management (requires human)
  createAgent(input: CreateAgentInput!): Agent!
  updateAgent(id: ID!, input: UpdateAgentInput!): Agent!
  suspendAgent(id: ID!, reason: String!): Agent!
  activateAgent(id: ID!): Agent!
  revokeAgent(id: ID!, reason: String!): Agent!

  # Agent token management (requires human)
  createAgentToken(input: CreateAgentTokenInput!): AgentTokenResult!
  revokeAgentToken(id: ID!): AgentToken!

  # Workspace membership (requires human)
  grantAgentMembership(input: GrantMembershipInput!): WorkspaceMembership!
  revokeAgentMembership(id: ID!): WorkspaceMembership!
  createTeam(input: CreateTeamInput!): Team!
  addTeamMember(input: AddTeamMemberInput!): TeamMember!
}

