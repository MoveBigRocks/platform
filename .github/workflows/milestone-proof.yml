name: Milestone 1 Proof

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  proof:
    name: Run Milestone 1 Proof
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
      TEST_DATABASE_ADMIN_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
      STORAGE_TYPE: filesystem
      STORAGE_PATH: /tmp/mbr-proof
      FILESYSTEM_PATH: /tmp/mbr-proof
      CACHE_ENABLED: true
      EMAIL_BACKEND: mock
      JWT_SECRET: milestone-proof-secret-at-least-32-characters
      ENVIRONMENT: test
      TRACING_ENABLED: "false"
      ENABLE_METRICS: "false"
      CLAMAV_ADDR: ""

    steps:
      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          path: platform

      - name: Resolve canonical workspace refs
        id: workspace_refs
        working-directory: platform
        run: |
          manifest="docs/evidence/canonical-workspace-refs.json"
          echo "extensions_ref=$(jq -r '.repositories.extensions.ref' "$manifest")" >> "$GITHUB_OUTPUT"
          echo "extension_sdk_ref=$(jq -r '.repositories[\"extension-sdk\"].ref' "$manifest")" >> "$GITHUB_OUTPUT"
          echo "packs_ref=$(jq -r '.repositories.packs.ref' "$manifest")" >> "$GITHUB_OUTPUT"

      - name: Checkout extensions
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/extensions
          path: extensions
          ref: ${{ steps.workspace_refs.outputs.extensions_ref }}

      - name: Checkout extension-sdk
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/extension-sdk
          path: extension-sdk
          ref: ${{ steps.workspace_refs.outputs.extension_sdk_ref }}

      - name: Checkout packs
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/packs
          path: packs
          ref: ${{ steps.workspace_refs.outputs.packs_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache-dependency-path: |
            platform/go.sum
            extensions/go.sum

      - name: Run milestone proof script
        working-directory: platform
        env:
          GH_TOKEN: ${{ github.token }}
          MBR_WORKSPACE_ROOT: ${{ github.workspace }}
          MBR_REQUIRE_WORKSPACE_REFS: "true"
          FIRST_PARTY_EXTENSIONS_ROOT: ${{ github.workspace }}/extensions
          CANONICAL_WORKSPACE_REFS_MANIFEST: docs/evidence/canonical-workspace-refs.json
          FIRST_PARTY_PUBLICATION_EVIDENCE_MANIFEST: docs/evidence/public-bundle-publication-runs.json
          REQUIRE_PUBLICATION_EVIDENCE: "true"
        run: |
          bash scripts/run-milestone-1-proof.sh \
            --version "proof-${GITHUB_SHA::12}" \
            --out dist/milestone-proof

      - name: Upload proof bundle
        uses: actions/upload-artifact@v4
        with:
          name: milestone-1-proof-${{ github.sha }}
          path: platform/dist/milestone-proof

      - name: Publish proof summary
        working-directory: platform
        run: cat dist/milestone-proof/summary.md >> "$GITHUB_STEP_SUMMARY"
