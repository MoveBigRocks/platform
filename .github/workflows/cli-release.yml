name: CLI Release

on:
  workflow_call:
    inputs:
      version:
        description: Release version
        required: true
        type: string
      git_sha:
        description: Commit to build
        required: true
        type: string
      publish:
        description: Publish assets to the GitHub release
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version override
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Cross-Platform CLI Archives
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: go.sum

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-${GITHUB_SHA::12}"
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CLI release archives
        run: |
          bash scripts/build-cli-release.sh \
            --version "${{ steps.version.outputs.value }}" \
            --out dist/cli-release

      - name: Verify CLI release bundle and embedded version
        run: |
          set -euo pipefail
          bash scripts/verify-cli-release.sh dist/cli-release \
            --version "${{ steps.version.outputs.value }}" \
            --git-sha "$(git rev-parse HEAD)"
          mkdir -p /tmp/mbr-cli-verify
          tar -xzf "dist/cli-release/mbr_${{ steps.version.outputs.value }}_linux_amd64.tar.gz" \
            -C /tmp/mbr-cli-verify
          /tmp/mbr-cli-verify/mbr version --json | \
            jq -e --arg version "${{ steps.version.outputs.value }}" '.version == $version'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release archives and metadata
        run: |
          shopt -s nullglob
          for file in dist/cli-release/*.tar.gz dist/cli-release/*.zip dist/cli-release/checksums.txt dist/cli-release/release-manifest.json; do
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem"
          done

      - name: Upload CLI release bundle
        uses: actions/upload-artifact@v6
        with:
          name: cli-release-${{ steps.version.outputs.value }}
          path: dist/cli-release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.value }}
          target_commitish: ${{ inputs.git_sha || github.sha }}
          files: dist/cli-release/*
          generate_release_notes: true

      - name: Create release summary
        run: |
          {
            echo "## CLI Release"
            echo
            echo "- Version: \`${{ steps.version.outputs.value }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo
            echo "### Files"
            echo
            ls -1 dist/cli-release | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
