name: Test

on:
  workflow_call:
    outputs:
      tests_passed:
        description: "Whether unit, integration, and PostgreSQL verification all passed"
        value: ${{ jobs.test.outputs.passed }}
      required_gate_passed:
        description: "Whether the hard-gated test workflow passed"
        value: ${{ jobs.test.outputs.required_gate_passed }}
      integration_tests_passed:
        description: "Whether the full integration sweep passed"
        value: ${{ jobs.test.outputs.integration_passed }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      MBR_WORKSPACE_ROOT: ${{ github.workspace }}
    outputs:
      passed: ${{ steps.unit_tests.outcome == 'success' && steps.integration_tests.outcome == 'success' && steps.postgres_tests.outcome == 'success' }}
      required_gate_passed: ${{ steps.unit_tests.outcome == 'success' && steps.integration_tests.outcome == 'success' && steps.postgres_tests.outcome == 'success' }}
      integration_passed: ${{ steps.integration_tests.outcome == 'success' }}
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: platform

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache-dependency-path: platform/go.sum

      - name: Install dependencies
        working-directory: platform
        run: go mod download

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v1.64.8
          working-directory: platform
          args: --timeout=5m
          install-mode: goinstall

      - name: Run docs link check
        working-directory: platform
        run: make docs-check

      - name: Check platform extension boundary
        working-directory: platform
        run: bash ./scripts/check-extension-boundary.sh

      - name: Run unit tests (no integration)
        id: unit_tests
        working-directory: platform
        env:
          DATABASE_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          TEST_DATABASE_ADMIN_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          STORAGE_TYPE: filesystem
          STORAGE_PATH: /tmp/mbr-test
          CACHE_ENABLED: true
        run: go test -v -short -race -coverprofile=coverage.out ./...

      - name: Run integration tests
        id: integration_tests
        working-directory: platform
        env:
          DATABASE_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          TEST_DATABASE_ADMIN_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          STORAGE_TYPE: filesystem
          STORAGE_PATH: /tmp/mbr-test
          CACHE_ENABLED: true
        run: go test -v -tags=integration ./...

      - name: Run PostgreSQL migration and store tests
        id: postgres_tests
        working-directory: platform
        env:
          TEST_DATABASE_ADMIN_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          STORAGE_TYPE: filesystem
          STORAGE_PATH: /tmp/mbr-test
          CACHE_ENABLED: true
        run: |
          go test -v ./pkg/extensionhost/infrastructure/stores/sql \
            -run 'TestStoreContractPostgres|TestExtensionSchemaMigrator|TestNewDBWithConfigRejectsDirtyPostgresMigrationLedger|TestOutboxStoreGetPendingOutboxEventsOnPostgres|TestIdempotencyStoreMarkProcessedOnPostgres|TestRuleStoreIncrementRuleStatsOnPostgres|TestErrorMonitoringStoreDeleteProjectOnPostgres|TestCaseStoreLinkCaseToKBArticleOnPostgres' \
            -count=1

      - name: Run deadcode on production packages only
        working-directory: platform
        run: make deadcode-production

      - name: Run Sentry SDK integration tests (optional, external)
        id: sentry_sdk_tests
        continue-on-error: true
        working-directory: platform
        run: |
          if [ "${RUN_SENTRY_SDK_TESTS:-false}" != "true" ]; then
            echo "Skipping Sentry SDK tests (set RUN_SENTRY_SDK_TESTS=true to run)."
            exit 0
          fi

          cd tests
          npm install --no-audit --no-fund
          node sentry_sdk_integration_test.js
          cd ..
          python3 -m pip install --user --quiet sentry-sdk requests
          python3 tests/sentry_sdk_integration_test.py

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./platform/coverage.out
          flags: unittests
        continue-on-error: true

      - name: Security scan with gosec
        continue-on-error: true
        working-directory: platform
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # Run gosec and fail on HIGH severity issues
          # -severity=high: Only fail on high severity issues
          # -confidence=high: Require high confidence to fail (reduces false positives)
          # Exclude test files and generated code
          gosec -severity=high -confidence=high -exclude-dir=tests -exclude-dir=testutil -fmt text ./...

      - name: Vulnerability scan with govulncheck
        continue-on-error: true
        working-directory: platform
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build verification
        working-directory: platform
        run: |
          go build -v -o mbr-server ./cmd/api
          go build -v -o mbr ./cmd/mbr

      - name: Create test summary
        if: always()
        working-directory: platform
        run: |
          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | sed 's/%//')
          else
            COVERAGE="N/A"
          fi

          REQUIRED_GATE_STATUS="${{ steps.unit_tests.outcome == 'success' && steps.integration_tests.outcome == 'success' && steps.postgres_tests.outcome == 'success' && 'passed' || 'failed' }}"
          INTEGRATION_STATUS="${{ steps.integration_tests.outcome == 'success' && 'passed' || 'failed' }}"
          ALL_CHECKS_STATUS="${{ steps.unit_tests.outcome == 'success' && steps.integration_tests.outcome == 'success' && steps.postgres_tests.outcome == 'success' && 'all checks passed' || 'workflow not fully green' }}"

          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Test Results

          **Overall status**: ${ALL_CHECKS_STATUS}
          **Required gate**: ${REQUIRED_GATE_STATUS}
          **Integration sweep**: ${INTEGRATION_STATUS}
          **Commit**: \`${{ github.sha }}\`
          **Coverage**: ${COVERAGE}%

          ### Checks Performed
          - Go linting (golangci-lint)
          - Unit tests with race detection (PostgreSQL)
          - Integration tests (hard-gated)
          - PostgreSQL migration and store integration tests
          - Dead-code scan (production packages)
          - Optional Sentry SDK integration tests
          - Security scan (gosec)
          - Build verification
          EOF
