{{define "topbar"}}
<header id="layout-topbar">
    <div class="flex items-center gap-4">
        <!-- Mobile menu toggle -->
        <button id="mobile-menu-btn" class="lg:hidden p-2 -ml-2 text-zinc-500 hover:text-zinc-900 transition-colors" onclick="toggleMobileMenu()">
            <i data-lucide="menu" class="h-5 w-5"></i>
        </button>
        <div>
            <h2 class="text-xl font-semibold tracking-tight text-zinc-900">{{if .PageTitle}}{{.PageTitle}}{{else}}Admin Panel{{end}}</h2>
            {{if .PageSubtitle}}
            <p class="text-sm text-zinc-500 hidden sm:block">{{.PageSubtitle}}</p>
            {{end}}
        </div>
    </div>

    <div class="flex items-center gap-4">
        <!-- Context Switcher -->
        {{template "context-switcher"}}

        <!-- Notifications -->
        <button class="relative p-2 text-zinc-400 hover:text-zinc-600 transition-colors">
            <i data-lucide="bell" class="h-5 w-5"></i>
            {{if .UnreadNotifications}}
            <span class="absolute top-2 right-2 h-2 w-2 rounded-full bg-red-500 border-2 border-white"></span>
            {{end}}
        </button>

        <!-- Divider -->
        <div class="divider-vertical"></div>

        <!-- User Menu -->
        <div class="dropdown">
            <button class="flex items-center gap-3 pl-2">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium text-zinc-900">{{if .UserName}}{{.UserName}}{{else}}User{{end}}</p>
                    <p class="text-xs text-zinc-500">{{if .UserRole}}{{.UserRole}}{{else}}Admin{{end}}</p>
                </div>
                <div class="avatar indigo uppercase">
                    {{if .UserName}}{{slice .UserName 0 2}}{{else}}U{{end}}
                </div>
            </button>
            <div class="dropdown-content">
                <div class="px-3 py-2 border-b border-zinc-100">
                    <p class="text-xs text-zinc-500">Signed in as</p>
                    <p class="text-sm font-medium text-zinc-900 truncate">{{if .UserEmail}}{{.UserEmail}}{{else}}user@example.com{{end}}</p>
                </div>
                <a href="/logout" class="dropdown-item danger">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    Sign Out
                </a>
            </div>
        </div>
    </div>
</header>
{{end}}
