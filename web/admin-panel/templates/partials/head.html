{{define "head"}}
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="shortcut icon" href="/static/images/favicon.png" />

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Custom admin styles -->
<style>
    :root {
        --sidebar-width: 256px;
        --topbar-height: 64px;
    }

    body {
        font-family: 'Inter', sans-serif;
    }

    /* == Layout: Sidebar == */
    #layout-sidebar {
        width: var(--sidebar-width);
        min-width: var(--sidebar-width);
        background: white;
        max-height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgb(228 228 231); /* zinc-200 */
        z-index: 40;
        transition: margin 0.3s ease;
    }

    #layout-sidebar.hide {
        margin-left: calc(var(--sidebar-width) * -1);
    }

    /* Sidebar logo area */
    .sidebar-logo {
        padding: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        border-bottom: 1px solid rgb(244 244 245); /* zinc-100 */
    }

    /* Logo frame - clean style on white background */
    .logo-frame {
        width: 75px;
        height: 75px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .logo-frame img {
        width: 78px;
        height: 78px;
        object-fit: contain;
    }

    /* Sidebar menu */
    #sidebar-menu {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 0.75rem;
    }

    .sidebar-menu-section {
        margin-bottom: 1.5rem;
    }

    .sidebar-menu-title {
        padding: 0 0.75rem;
        margin-bottom: 0.5rem;
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: rgb(161 161 170); /* zinc-400 */
    }

    .sidebar-menu-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(82 82 91); /* zinc-600 */
        transition: all 0.15s ease;
        text-decoration: none;
    }

    .sidebar-menu-item:hover {
        background: rgb(250 250 250); /* zinc-50 */
        color: rgb(24 24 27); /* zinc-900 */
    }

    .sidebar-menu-item.active {
        background: rgb(244 244 245); /* zinc-100 */
        color: rgb(24 24 27); /* zinc-900 */
    }

    .sidebar-menu-item i {
        width: 1rem;
        height: 1rem;
        color: rgb(161 161 170); /* zinc-400 */
    }

    .sidebar-menu-item:hover i,
    .sidebar-menu-item.active i {
        color: rgb(24 24 27); /* zinc-900 */
    }

    .sidebar-menu-item .badge {
        margin-left: auto;
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        background: rgb(244 244 245); /* zinc-100 */
        color: rgb(82 82 91); /* zinc-600 */
    }

    /* Sidebar footer */
    .sidebar-footer {
        padding: 1rem;
        border-top: 1px solid rgb(244 244 245); /* zinc-100 */
    }

    .sidebar-footer-btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(82 82 91); /* zinc-600 */
        background: transparent;
        border: none;
        cursor: pointer;
        transition: color 0.15s;
    }

    .sidebar-footer-btn:hover {
        color: rgb(24 24 27); /* zinc-900 */
    }

    /* == Layout: Content == */
    #layout-content {
        flex: 1;
        margin-left: var(--sidebar-width);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: margin 0.3s ease;
    }

    /* == Layout: Topbar == */
    #layout-topbar {
        height: var(--topbar-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        background: rgba(255 255 255 / 0.8);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgb(228 228 231); /* zinc-200 */
        position: sticky;
        top: 0;
        z-index: 30;
    }

    /* == Main Content Area == */
    #layout-main {
        flex: 1;
        overflow-y: auto;
        background: rgb(250 250 250 / 0.5); /* gray-50/50 */
        padding: 1.5rem 2rem;
    }

    /* == Dashboard Cards == */
    .metric-card {
        background: white;
        border-radius: 0.75rem;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        padding: 1.25rem;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        transition: box-shadow 0.2s;
    }

    .metric-card:hover {
        box-shadow: 0 4px 6px rgba(0,0,0,0.04);
    }

    .metric-card-icon {
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
    }

    .metric-card-icon.indigo {
        background: rgb(238 242 255); /* indigo-50 */
        color: rgb(79 70 229); /* indigo-600 */
    }

    .metric-card-icon.emerald {
        background: rgb(236 253 245); /* emerald-50 */
        color: rgb(5 150 105); /* emerald-600 */
    }

    .metric-card-icon.amber {
        background: rgb(255 251 235); /* amber-50 */
        color: rgb(217 119 6); /* amber-600 */
    }

    .metric-card-icon.blue {
        background: rgb(239 246 255); /* blue-50 */
        color: rgb(37 99 235); /* blue-600 */
    }

    .trend-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
    }

    .trend-badge.positive {
        background: rgb(240 253 244); /* green-50 */
        color: rgb(22 163 74); /* green-600 */
    }

    .trend-badge.neutral {
        background: rgb(244 244 245); /* zinc-100 */
        color: rgb(113 113 122); /* zinc-500 */
    }

    /* == Section Cards == */
    .section-card {
        background: white;
        border-radius: 0.75rem;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        overflow: hidden;
    }

    .section-card-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid rgb(244 244 245); /* zinc-100 */
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .section-card-title {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: rgb(24 24 27); /* zinc-900 */
    }

    .section-card-body {
        padding: 1.5rem;
    }

    /* == Quick Action Buttons == */
    .quick-action-btn {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
        border-radius: 0.5rem;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        background: white;
        text-align: left;
        transition: all 0.15s;
        cursor: pointer;
        text-decoration: none;
    }

    .quick-action-btn:hover {
        border-color: rgb(165 180 252); /* indigo-300 */
        box-shadow: 0 4px 6px rgba(99 102 241 / 0.05);
    }

    .quick-action-btn .icon-wrapper {
        width: 2.5rem;
        height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: rgb(250 250 250); /* zinc-50 */
        color: rgb(82 82 91); /* zinc-600 */
        transition: all 0.15s;
    }

    .quick-action-btn:hover .icon-wrapper {
        background: rgb(238 242 255); /* indigo-50 */
        color: rgb(79 70 229); /* indigo-600 */
    }

    /* == Timeline == */
    .timeline-item {
        position: relative;
        padding-left: 1.5rem;
        padding-bottom: 0.5rem;
        border-left: 1px solid rgb(228 228 231); /* zinc-200 */
    }

    .timeline-item:last-child {
        border-left: none;
    }

    .timeline-dot {
        position: absolute;
        left: -0.375rem;
        top: 0.25rem;
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 9999px;
        border: 2px solid white;
        box-shadow: 0 0 0 4px rgb(238 242 255); /* indigo-50 */
    }

    .timeline-dot.active {
        background: rgb(79 70 229); /* indigo-600 */
    }

    .timeline-dot.inactive {
        background: rgb(212 212 216); /* zinc-300 */
    }

    /* == System Status == */
    .status-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        border-radius: 0.5rem;
        background: rgba(250 250 250 / 0.5); /* zinc-50/50 */
        border: 1px solid rgb(244 244 245); /* zinc-100 */
    }

    .status-dot {
        position: relative;
        display: flex;
        width: 0.75rem;
        height: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .status-dot.healthy .ping {
        animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        position: absolute;
        display: inline-flex;
        width: 100%;
        height: 100%;
        border-radius: 9999px;
        background: rgb(74 222 128); /* green-400 */
        opacity: 0.75;
    }

    .status-dot .dot {
        position: relative;
        display: inline-flex;
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 9999px;
    }

    .status-dot.healthy .dot {
        background: rgb(34 197 94); /* green-500 */
    }

    .status-dot.degraded .dot {
        background: rgb(234 179 8); /* yellow-500 */
    }

    .status-dot.unhealthy .dot {
        background: rgb(239 68 68); /* red-500 */
    }

    @keyframes ping {
        75%, 100% {
            transform: scale(2);
            opacity: 0;
        }
    }

    /* == Buttons == */
    .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: 0.375rem;
        transition: all 0.15s;
        cursor: pointer;
        text-decoration: none;
    }

    .btn-ghost {
        background: transparent;
        border: none;
        color: rgb(113 113 122); /* zinc-500 */
    }

    .btn-ghost:hover {
        color: rgb(82 82 91); /* zinc-600 */
    }

    .btn-link {
        background: transparent;
        border: none;
        color: rgb(79 70 229); /* indigo-600 */
    }

    .btn-link:hover {
        color: rgb(67 56 202); /* indigo-700 */
    }

    /* == Avatar == */
    .avatar {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        font-weight: 500;
        color: white;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .avatar.indigo {
        background: rgb(79 70 229); /* indigo-600 */
        box-shadow: 0 0 0 2px rgb(238 242 255); /* indigo-50 */
    }

    /* == Dropdown == */
    .dropdown {
        position: relative;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        min-width: 13rem;
        background: white;
        border-radius: 0.5rem;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        z-index: 50;
        padding: 0.5rem;
    }

    /* Invisible bridge to maintain hover between button and dropdown */
    .dropdown-content::before {
        content: '';
        position: absolute;
        top: -0.5rem;
        left: 0;
        right: 0;
        height: 0.5rem;
    }

    .dropdown:hover .dropdown-content,
    .dropdown:focus-within .dropdown-content {
        display: block;
    }

    .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        color: rgb(82 82 91); /* zinc-600 */
        border-radius: 0.375rem;
        text-decoration: none;
    }

    .dropdown-item:hover {
        background: rgb(244 244 245); /* zinc-100 */
    }

    .dropdown-item.danger {
        color: rgb(220 38 38); /* red-600 */
    }

    /* == Badge/Chip == */
    .chip {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.625rem;
        font-size: 0.75rem;
        font-weight: 500;
        border-radius: 9999px;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        background: rgb(250 250 250); /* zinc-50 */
        color: rgb(82 82 91); /* zinc-600 */
    }

    .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        font-weight: 500;
        border-radius: 9999px;
    }

    .status-badge.success {
        background: rgb(240 253 244); /* green-50 */
        color: rgb(21 128 61); /* green-700 */
        box-shadow: inset 0 0 0 1px rgba(22 163 74 / 0.2); /* green-600/20 */
    }

    /* == Mobile Sidebar Overlay == */
    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 45;
        transition: opacity 0.3s ease;
    }

    .sidebar-overlay.show {
        display: block;
    }

    /* == Responsive == */
    @media (max-width: 1024px) {
        #layout-sidebar {
            margin-left: calc(var(--sidebar-width) * -1);
            z-index: 50;
        }

        #layout-sidebar.show {
            margin-left: 0;
        }

        #layout-content {
            margin-left: 0;
        }
    }

    @media (max-width: 768px) {
        #layout-topbar {
            padding: 0 1rem;
        }

        #layout-main {
            padding: 1rem;
        }
    }

    /* == Grafana iframe == */
    .dashboard-iframe {
        border: none;
        width: 100%;
        min-height: 600px;
        border-radius: 0.5rem;
    }

    /* == Divider == */
    .divider-vertical {
        width: 1px;
        height: 1.5rem;
        background: rgb(228 228 231); /* zinc-200 */
    }

    /* == Tab Buttons == */
    .tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(113 113 122); /* zinc-500 */
        background: transparent;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: all 0.15s;
    }

    .tab-btn:hover {
        color: rgb(24 24 27); /* zinc-900 */
        background: rgb(244 244 245); /* zinc-100 */
    }

    .tab-btn.active {
        color: rgb(79 70 229); /* indigo-600 */
        background: rgb(238 242 255); /* indigo-50 */
    }

    /* == Form Inputs == */
    .form-input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        border-radius: 0.5rem;
        background: white;
        transition: all 0.15s;
    }

    .form-input:focus {
        outline: none;
        border-color: rgb(165 180 252); /* indigo-300 */
        box-shadow: 0 0 0 3px rgba(79 70 229 / 0.1);
    }

    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(63 63 70); /* zinc-700 */
        margin-bottom: 0.375rem;
    }

    .form-hint {
        font-size: 0.75rem;
        color: rgb(113 113 122); /* zinc-500 */
        margin-top: 0.25rem;
    }

    /* == Modal Styles (for dialogs) == */
    dialog.modal {
        padding: 0;
        border: none;
        border-radius: 0.75rem;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        max-width: 28rem;
        width: calc(100% - 2rem);
    }

    dialog.modal::backdrop {
        background: rgba(0,0,0,0.5);
    }

    .modal-box {
        padding: 1.5rem;
    }

    .modal-action {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid rgb(244 244 245); /* zinc-100 */
    }

    /* == Primary Button == */
    .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: white;
        background: rgb(79 70 229); /* indigo-600 */
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: all 0.15s;
    }

    .btn-primary:hover {
        background: rgb(67 56 202); /* indigo-700 */
    }

    .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(63 63 70); /* zinc-700 */
        background: white;
        border: 1px solid rgb(228 228 231); /* zinc-200 */
        border-radius: 0.375rem;
        cursor: pointer;
        transition: all 0.15s;
    }

    .btn-secondary:hover {
        background: rgb(250 250 250); /* zinc-50 */
        border-color: rgb(212 212 216); /* zinc-300 */
    }

    /* == Responsive Tables == */
    .responsive-table {
        width: 100%;
        border-collapse: collapse;
    }

    .responsive-table th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: rgb(113 113 122); /* zinc-500 */
        border-bottom: 1px solid rgb(244 244 245); /* zinc-100 */
    }

    .responsive-table td {
        padding: 1rem;
        border-bottom: 1px solid rgb(244 244 245); /* zinc-100 */
        vertical-align: middle;
    }

    .responsive-table tbody tr {
        cursor: pointer;
        transition: background 0.15s;
    }

    .responsive-table tbody tr:hover {
        background: rgb(250 250 250); /* zinc-50 */
    }

    .responsive-table tbody tr:last-child td {
        border-bottom: none;
    }

    /* Mobile: transform table rows into cards */
    @media (max-width: 768px) {
        .responsive-table thead {
            display: none;
        }

        .responsive-table tbody tr {
            display: block;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: white;
            border: 1px solid rgb(228 228 231); /* zinc-200 */
            border-radius: 0.75rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .responsive-table tbody tr:hover {
            border-color: rgb(165 180 252); /* indigo-300 */
        }

        .responsive-table tbody tr:last-child {
            margin-bottom: 0;
        }

        .responsive-table td {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgb(244 244 245); /* zinc-100 */
            gap: 1rem;
        }

        .responsive-table td:last-child {
            border-bottom: none;
        }

        .responsive-table td::before {
            content: attr(data-label);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgb(113 113 122); /* zinc-500 */
            flex-shrink: 0;
        }

        .responsive-table td:first-child {
            border-bottom: none;
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .responsive-table td:first-child::before {
            display: none;
        }

        /* First cell spans full width as card header */
        .responsive-table td.mobile-header {
            display: block;
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgb(244 244 245);
        }

        .responsive-table td.mobile-header::before {
            display: none;
        }

        /* Hide actions label on mobile */
        .responsive-table td.mobile-actions::before {
            display: none;
        }

        .responsive-table td.mobile-actions {
            justify-content: flex-end;
            padding-top: 0.75rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgb(244 244 245);
            border-bottom: none;
        }
    }
</style>

<!-- Initialize Lucide icons after page load -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{{end}}
