{{define "analytics_properties.html"}}
<!doctype html>
<html lang="en">
    <head>
        <title>Analytics Properties - Move Big Rocks Admin Panel</title>
        {{template "head"}}
        <style>
            .property-grid {
                display: grid;
                gap: 1rem;
                grid-template-columns: repeat(1, 1fr);
            }
            @media (min-width: 768px) {
                .property-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
            @media (min-width: 1024px) {
                .property-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
            }
            .property-card {
                background: white;
                border-radius: 0.75rem;
                border: 1px solid rgb(228 228 231);
                padding: 1.5rem;
                box-shadow: 0 1px 2px rgba(0,0,0,0.04);
                transition: box-shadow 0.2s, border-color 0.2s;
                cursor: pointer;
            }
            .property-card:hover {
                box-shadow: 0 4px 6px rgba(0,0,0,0.04);
                border-color: rgb(199 210 254);
            }
            .visitor-count {
                font-size: 2rem;
                font-weight: 700;
                color: rgb(24 24 27);
                line-height: 1;
            }
            .visitor-label {
                font-size: 0.8125rem;
                color: rgb(113 113 122);
                margin-top: 0.25rem;
            }
            .empty-state {
                padding: 4rem 2rem;
                text-align: center;
                background: white;
                border-radius: 0.75rem;
                border: 1px solid rgb(228 228 231);
            }
            .empty-state-icon {
                width: 4rem;
                height: 4rem;
                margin: 0 auto 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 9999px;
                background: rgb(244 244 245);
                color: rgb(161 161 170);
            }
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 50;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.active { display: flex; }
            .modal-content {
                background: white;
                border-radius: 0.75rem;
                padding: 1.5rem;
                width: 100%;
                max-width: 28rem;
                box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            }
        </style>
    </head>

    <body class="bg-gray-50/50 text-zinc-900 antialiased h-screen flex overflow-hidden">
        {{template "sidebar" .}}

        <main id="layout-content">
            {{template "topbar" .}}

            <div id="layout-main">
                <div class="max-w-7xl mx-auto space-y-6">

                    <!-- Header -->
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-zinc-500" id="property-count">Loading properties...</p>
                        <button onclick="showAddModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                            <i data-lucide="plus" class="h-4 w-4"></i>
                            Add Property
                        </button>
                    </div>

                    <!-- Properties Grid (populated by JS) -->
                    <div id="properties-grid" class="property-grid"></div>

                    <!-- Empty State (shown when no properties) -->
                    <div id="empty-state" class="empty-state" style="display:none;">
                        <div class="empty-state-icon">
                            <i data-lucide="bar-chart-3" class="h-8 w-8"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-zinc-900">No properties yet</h3>
                        <p class="text-zinc-500 mt-1 max-w-md mx-auto">
                            Add a property to start tracking web analytics for your sites.
                        </p>
                        <button onclick="showAddModal()" class="inline-flex items-center gap-2 px-4 py-2 mt-4 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                            <i data-lucide="plus" class="h-4 w-4"></i>
                            Add First Property
                        </button>
                    </div>

                </div>
            </div>
        </main>

        <!-- Add Property Modal -->
        <div id="add-modal" class="modal-overlay" onclick="if(event.target===this)hideAddModal()">
            <div class="modal-content">
                <h3 class="text-lg font-semibold text-zinc-900 mb-4">Add Property</h3>
                <form id="add-property-form" onsubmit="return createProperty(event)">
                    <div class="space-y-4">
                        <div id="workspace-field" style="display:none;">
                            <label class="block text-sm font-medium text-zinc-700 mb-1">Workspace</label>
                            <select id="prop-workspace"
                                class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-zinc-700 mb-1">Domain</label>
                            <input type="text" id="prop-domain" required placeholder="example.com"
                                class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-zinc-700 mb-1">Timezone</label>
                            <select id="prop-timezone"
                                class="w-full px-3 py-2 border border-zinc-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="UTC">UTC (UTC+0)</option>
                                <option value="Pacific/Auckland">New Zealand (UTC+12/+13)</option>
                                <option value="Australia/Sydney">Australia Eastern (UTC+10/+11)</option>
                                <option value="Asia/Tokyo">Japan / Korea (UTC+9)</option>
                                <option value="Asia/Shanghai">China / Singapore (UTC+8)</option>
                                <option value="Asia/Kolkata">India (UTC+5:30)</option>
                                <option value="Europe/Paris">Central Europe (UTC+1/+2)</option>
                                <option value="Europe/London">UK / Ireland (UTC+0/+1)</option>
                                <option value="America/Sao_Paulo">Brazil (UTC-3)</option>
                                <option value="America/New_York">US Eastern (UTC-5/-4)</option>
                                <option value="America/Chicago">US Central (UTC-6/-5)</option>
                                <option value="America/Denver">US Mountain (UTC-7/-6)</option>
                                <option value="America/Los_Angeles">US Pacific (UTC-8/-7)</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" onclick="hideAddModal()" class="px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-100 rounded-lg transition-colors">Cancel</button>
                        <button type="submit" id="create-btn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">Create Property</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
        var ANALYTICS_BASE_PATH = '{{.AnalyticsBasePath}}';
        var ANALYTICS_API_BASE = ANALYTICS_BASE_PATH + '/api';

        function analyticsApi(path, options) {
            options = options || {};
            var headers = options.headers || {};
            if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
            return fetch(ANALYTICS_API_BASE + path, {
                method: options.method || 'GET',
                headers: headers,
                credentials: 'same-origin',
                body: options.body
            }).then(function(r) {
                return r.json().then(function(data) {
                    if (!r.ok) throw new Error(data.error || 'Analytics request failed');
                    return data;
                });
            });
        }

        function loadProperties() {
            analyticsApi('/properties')
            .then(function(res) {
                var props = res.properties || [];
                renderProperties(props);
            })
            .catch(function() {
                document.getElementById('property-count').textContent = 'Failed to load properties';
            });
        }

        function renderProperties(props) {
            var grid = document.getElementById('properties-grid');
            var empty = document.getElementById('empty-state');
            var count = document.getElementById('property-count');

            if (props.length === 0) {
                grid.style.display = 'none';
                empty.style.display = '';
                count.textContent = 'No properties';
                if (window.lucide) lucide.createIcons();
                return;
            }

            empty.style.display = 'none';
            grid.style.display = '';
            count.textContent = props.length + ' propert' + (props.length === 1 ? 'y' : 'ies');

            var html = '';
            for (var i = 0; i < props.length; i++) {
                var p = props[i];
                var href = p.verifiedAt ? ANALYTICS_BASE_PATH + '/' + p.id : ANALYTICS_BASE_PATH + '/' + p.id + '/setup';
                var statusBadge = '';
                if (p.status === 'paused') {
                    statusBadge = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">Paused</span>';
                }

                html += '<a href="' + href + '" class="property-card block">';
                html += '<div class="flex items-start justify-between">';
                html += '<h3 class="font-semibold text-zinc-900">' + escapeHtml(p.domain) + '</h3>';
                html += statusBadge;
                html += '</div>';

                if (p.verifiedAt) {
                    html += '<div class="mt-4">';
                    html += '<p class="visitor-count">' + p.visitorsLast24h + '</p>';
                    html += '<p class="visitor-label">visitors in last 24h</p>';
                    html += '</div>';
                } else {
                    html += '<div class="mt-4">';
                    html += '<p class="text-sm text-amber-600 font-medium">Awaiting verification</p>';
                    html += '<p class="text-sm text-indigo-600 mt-1">Continue setup &rarr;</p>';
                    html += '</div>';
                }

                html += '</a>';
            }
            grid.innerHTML = html;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function showAddModal() {
            document.getElementById('add-modal').classList.add('active');
            document.getElementById('prop-domain').focus();
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('add-property-form').reset();
        }

        function createProperty(e) {
            e.preventDefault();
            var domain = document.getElementById('prop-domain').value.trim();
            var timezone = document.getElementById('prop-timezone').value;
            var btn = document.getElementById('create-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            analyticsApi('/properties', {
                method: 'POST',
                body: JSON.stringify({domain: domain, timezone: timezone})
            }).then(function(res) {
                var id = res.property.id;
                window.location.href = ANALYTICS_BASE_PATH + '/' + id + '/setup';
            }).catch(function() {
                alert('Failed to create property');
                btn.disabled = false;
                btn.textContent = 'Create Property';
            });

            return false;
        }

        loadProperties();
        </script>
    </body>
</html>
{{end}}
