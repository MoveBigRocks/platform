{{define "error.html"}}
<!doctype html>
<html lang="en">
    <head>
        <title>Error - Move Big Rocks Admin</title>
        {{template "head"}}
    </head>

    <body class="bg-[#F5F5F7] min-h-screen flex items-center justify-center p-4 text-gray-600">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-gray-200/60 overflow-hidden">
            <div class="px-8 py-10 space-y-6">
                <div class="text-center space-y-4">
                    <div class="mx-auto w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
                        <i data-lucide="alert-triangle" class="h-8 w-8 text-red-600"></i>
                    </div>
                    <h1 class="text-xl font-semibold text-zinc-900">Something went wrong</h1>
                    <p class="text-sm text-zinc-500">An unexpected error occurred. Please try again or contact support if the problem persists.</p>
                </div>

                <div class="flex flex-col gap-3">
                    <a href="javascript:history.back()" class="w-full px-4 py-2.5 text-sm font-medium text-center text-zinc-700 bg-zinc-100 hover:bg-zinc-200 rounded-lg transition-colors">
                        Go Back
                    </a>
                    <a href="/dashboard" class="w-full px-4 py-2.5 text-sm font-medium text-center text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">
                        Return to Dashboard
                    </a>
                </div>
            </div>
        </div>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script>lucide.createIcons();</script>
    </body>
</html>
{{end}}
